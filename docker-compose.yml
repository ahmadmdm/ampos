version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pos1
      POSTGRES_PASSWORD: pos1
      POSTGRES_DB: pos1
    ports:
      - "55432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

volumes:
  pg_data:
